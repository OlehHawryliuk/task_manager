# version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: task_manager_postgres
    environment:
      POSTGRES_USER: gorm
      POSTGRES_PASSWORD: gorm
      POSTGRES_DB: gorm
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gorm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task_manager_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: task_manager_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task_manager_network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_manager_app
    environment:
      DB_HOST: postgres
      DB_USER: gorm
      DB_PASSWORD: gorm
      DB_NAME: gorm
      DB_PORT: 5432
      JWT_SECRET: your-secret-key-here-min-32-chars
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GIN_MODE: debug
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - task_manager_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  task_manager_network:
    driver: bridge